; PlatformIO config — Pseudo Vinyl MP3 Player
; Board: ESP32-WROOM-32 (classic ESP32 — required for Bluetooth Classic / A2DP)
; 4MB flash, 520KB SRAM, NO PSRAM

[env:esp32dev]
platform = espressif32@6.12.0
board = esp32dev
framework = arduino

; 4MB flash, no OTA — BT Classic + LVGL + audio needs the big app partition
board_build.partitions = huge_app.csv

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -I src
    ; --- TFT_eSPI GC9A01 config (VSPI) ---
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MISO=-1
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=19
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=40000000
    ; --- LVGL config ---
    -DLV_CONF_INCLUDE_SIMPLE
    ; --- Project ---
    -DBT_ENABLED=1
    -DCORE_DEBUG_LEVEL=3

; Serial monitor
monitor_speed = 115200

; Libraries
; NOTE: ESP32-audioI2S was dropped — v3.x requires PSRAM, which the WROOM-32
; does not have. Replaced with the pschatzmann stack (helix MP3 decode +
; A2DP source), which runs from internal SRAM.
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^8.3.11
    https://github.com/pschatzmann/arduino-audio-tools.git
    https://github.com/pschatzmann/arduino-libhelix.git
    https://github.com/pschatzmann/ESP32-A2DP.git
