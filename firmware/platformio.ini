; PlatformIO config — Pseudo Vinyl MP3 Player
; Board: ESP32-S3-WROOM-1 N8R8 (8MB Flash, 8MB PSRAM)

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Flash & memory
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = huge_app.csv

; PSRAM
board_build.arduino.memory_type = qio_opi
build_flags =
    -I src
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_USE_MALLOC
    ; --- TFT_eSPI GC9A01 config (override User_Setup.h) ---
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=14
    -DTFT_BL=21
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    ; --- LVGL config ---
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_TICK_PERIOD_MS=5
    ; --- Project ---
    -DBT_ENABLED=0
    -DCORE_DEBUG_LEVEL=3

; Serial monitor
monitor_speed = 115200

; Libraries
lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    lvgl/lvgl@^8.3.11
    https://github.com/schreibfaul1/ESP32-audioI2S.git
