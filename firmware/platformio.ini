; PlatformIO config — Pseudo Vinyl MP3 Player
; Board: ESP32-WROVER N4R8 (classic ESP32 — required for Bluetooth Classic /
; A2DP). 4MB flash, 520KB SRAM, 8MB PSRAM (~4MB of it directly mappable —
; the rest sits behind the himem bank-switch API and is not used here).
;
; Board id stays `esp32dev`: it is the generic classic-ESP32 definition
; (mcu esp32, variant esp32, 4MB flash), which is what a third-party WROVER
; module needs. The `esp-wrover-kit` definition is NOT used — it adds no
; PSRAM flags of its own and hard-codes FTDI/460800 upload for Espressif's
; official dev kit. PSRAM is enabled explicitly below instead.

[env:esp32dev]
platform = espressif32@6.12.0
board = esp32dev
framework = arduino

; 4MB flash, no OTA — BT Classic + LVGL + audio needs the big app partition
board_build.partitions = huge_app.csv

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -I src
    ; --- PSRAM (WROVER) ---
    ; BOARD_HAS_PSRAM makes initArduino() call psramInit(). The Arduino
    ; framework is prebuilt with CONFIG_SPIRAM_USE_MALLOC=y and
    ; CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=4096, so ordinary malloc/new
    ; larger than 4KB lands in PSRAM automatically and only smaller
    ; allocations compete for internal SRAM. Anything that MUST be internal
    ; (DMA, Bluedroid, ISR data) already asks for it by capability.
    ; -mfix-esp32-psram-cache-issue matches the prebuilt framework, which
    ; ships CONFIG_SPIRAM_CACHE_WORKAROUND=y. It is only strictly required
    ; on ESP32 silicon rev <3; dropping it buys a little speed but only if
    ; this module is confirmed rev 3+.
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; --- TFT_eSPI GC9A01 config ---
    ; Routed through the GPIO matrix (none of these are VSPI IOMUX pins).
    ; If the panel shows tearing/garbage, drop SPI_FREQUENCY to 27000000
    ; first — matrix routing is the usual reason 40MHz gets marginal.
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MISO=-1
    -DTFT_MOSI=0
    -DTFT_SCLK=5
    -DTFT_CS=2
    -DTFT_DC=23
    -DTFT_RST=15
    -DTFT_BL=-1
    -DSPI_FREQUENCY=40000000
    ; --- LVGL config ---
    -DLV_CONF_INCLUDE_SIMPLE
    ; --- Project ---
    -DBT_ENABLED=1
    ; TEMPORARILY back at 3 (info) to expose Bluedroid congestion / link
    ; warnings while diagnosing A2DP stutter with a healthy PCM pipeline.
    ; Restore to 1 (errors only) once the radio-side question is answered —
    ; IDF info-level logging costs flash and some working RAM.
    -DCORE_DEBUG_LEVEL=3

; Serial monitor
monitor_speed = 115200

; Libraries
; NOTE: ESP32-audioI2S was dropped when this was a WROOM-32 (no PSRAM) —
; v3.x of that library requires PSRAM. Replaced with the pschatzmann stack
; (helix MP3 decode + A2DP source), which runs from internal SRAM. The
; WROVER now has PSRAM, so that constraint no longer applies, but the
; current stack works and is not worth churning.
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^8.3.11
    https://github.com/pschatzmann/arduino-audio-tools.git
    https://github.com/pschatzmann/arduino-libhelix.git
    ; pinned to a tagged release — the master snapshot (1.8.11+sha.b559fb1)
    ; is a suspect for the A2DP source chop; master pins are untested states
    https://github.com/pschatzmann/ESP32-A2DP.git#v1.8.7

; Debug run mode: serial console simulates buttons/encoder.
; Build/upload with: pio run -e esp32dev-debug -t upload
[env:esp32dev-debug]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DDEBUG_MODE=1
